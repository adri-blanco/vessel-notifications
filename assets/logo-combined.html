<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIS Notify — Combined Concept</title>
  <style>
    :root {
      --bg:     #06101c;
      --bg2:    #0b1a2c;
      --border: rgba(0, 190, 230, 0.12);
      --accent: #00c8f0;
      --text:   #b8d4e8;
      --muted:  #4e6e88;
      --name:   #ddeef8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 40px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 64px;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.65;
      margin-bottom: 18px;
    }

    header h1 {
      font-size: 30px;
      font-weight: 200;
      letter-spacing: 0.1em;
      color: var(--name);
      margin-bottom: 12px;
    }

    header p {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.8;
    }

    /* ── Source row ── */
    .sources {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      align-items: flex-end;
    }

    .arrow {
      font-size: 18px;
      color: var(--accent);
      opacity: 0.3;
      padding-bottom: 28px;
    }

    .source-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px 20px 18px;
      text-align: center;
      width: 140px;
      opacity: 0.55;
    }

    .source-card svg {
      width: 70px;
      height: 70px;
      color: #5a9abb;
    }

    .source-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-top: 12px;
    }

    /* ── Combined ── */
    .combined-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      width: 100%;
      max-width: 700px;
    }

    .sizes {
      display: flex;
      gap: 48px;
      align-items: flex-end;
      justify-content: center;
    }

    .size-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .size-item svg {
      color: var(--accent);
    }

    .size-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    /* On-dark vs on-light preview */
    .previews {
      display: flex;
      gap: 16px;
    }

    .preview-box {
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 36px 40px;
      width: 200px;
    }

    .preview-box.dark {
      background: #060e18;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .preview-box.light {
      background: #f0f4f8;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .preview-box.dark svg   { color: #00c8f0; }
    .preview-box.light svg  { color: #0a5e80; }

    .preview-box.dark  .plabel { color: rgba(255,255,255,0.25); }
    .preview-box.light .plabel { color: rgba(0,0,0,0.3); }

    .plabel {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* Wordmark preview */
    .wordmark {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 28px 40px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .wordmark svg { color: var(--accent); width: 40px; height: 40px; }

    .wm-text { color: var(--name); }
    .wm-text .wm-name {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.12em;
    }
    .wm-text .wm-sub {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-top: 3px;
    }

    footer {
      text-align: center;
      margin-top: 72px;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      opacity: 0.4;
    }
  </style>
</head>
