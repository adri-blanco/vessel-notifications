<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip">
      <rect x="20" y="8" width="72" height="48"/>
    </clipPath>
  </defs>

  <!-- Radar arcs from mast tip -->
  <circle cx="20" cy="56" r="20" stroke="#0a5e80" stroke-width="1.5" clip-path="url(#clip)" opacity="0.32"/>
  <circle cx="20" cy="56" r="38" stroke="#0a5e80" stroke-width="1.5" clip-path="url(#clip)" opacity="0.48"/>
  <circle cx="20" cy="56" r="58" stroke="#0a5e80" stroke-width="1.5" clip-path="url(#clip)" opacity="0.64"/>

  <!-- Sweep line -->
  <line x1="20" y1="56" x2="78" y2="16" stroke="#0a5e80" stroke-width="0.75" clip-path="url(#clip)" opacity="0.20"/>

  <!-- Distant vessel echo + pulse ring -->
  <circle cx="68" cy="24" r="9" stroke="#0a5e80" stroke-width="1" opacity="0.28"/>
  <circle cx="68" cy="24" r="4" fill="#0a5e80"/>

  <!-- Closer vessel echo -->
  <circle cx="50" cy="42" r="2.5" fill="#0a5e80" opacity="0.65"/>

  <!-- Mast -->
  <line x1="20" y1="56" x2="20" y2="65" stroke="#0a5e80" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cabin -->
  <rect x="13" y="65" width="15" height="9" rx="1.5" stroke="#0a5e80" stroke-width="1.5"/>

  <!-- Hull -->
  <path d="M 5 83 L 9 74 L 46 74 L 50 83 Z" stroke="#0a5e80" stroke-width="2" stroke-linejoin="round"/>

  <!-- Waterline -->
  <path d="M 2 87 Q 12 89 22 87 Q 32 85 42 87 Q 52 89 58 87" stroke="#0a5e80" stroke-width="1" stroke-linecap="round" opacity="0.22"/>
</svg>
